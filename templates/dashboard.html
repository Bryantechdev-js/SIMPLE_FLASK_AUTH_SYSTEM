{% extends 'base.html' %}

{% block title %}Dashboard | Flask Auth System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5 text-center">
                <h1 class="mb-3">Welcome, {{ user_name }}</h1>
                <p class="lead text-muted">You are logged in successfully.</p>
                <div class="mt-4">
                    <p class="mb-2"><strong>Name:</strong> {{ user_name }}</p>
                    <p class="mb-4"><strong>Email:</strong> {{ user_email }}</p>
                    <a href="{{ url_for('logout') }}" class="btn btn-danger px-4">Logout</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
